name: Deploy to Hostinger

on:
  push:
    branches:
      - main # This will trigger the deployment every time you merge code into the main branch
  workflow_dispatch: # Allows you to manually trigger the deployment from the GitHub Actions tab

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4
    
    - name: Sync files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        
        # Protect production files from being overwritten or deleted!
        exclude: |
          **/.git*
          **/.git*/**
          .github/**
          config.php
          uploads/**
          tests/**
          database.sql
          README.md
